<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO Russian: All-in-One</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #6366f1; --bg: #0f172a; --card-bg: #1e293b;
            --text: #f8fafc; --text-muted: #94a3b8;
            --success: #10b981; --perfect: #22c55e;
            --warning: #f59e0b; --danger: #ef4444;
            --critical: #f43f5e; --accent-purple: #a855f7;
            --tg-bg: var(--tg-theme-bg-color, #0f172a);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Manrope', sans-serif; background-color: var(--bg); color: var(--text); overflow-x: hidden; }
        .page { display: none; padding: 15px; width: 100%; max-width: 500px; margin: 0 auto; min-height: 100vh; }
        .page.active { display: flex; flex-direction: column; gap: 20px; }

        /* ЭЛЕМЕНТЫ ДАШБОРДА */
        .predict-card { background: linear-gradient(135deg, var(--primary), var(--accent-purple)); padding: 24px; border-radius: 30px; box-shadow: 0 15px 35px rgba(99, 102, 241, 0.3); }
        .predict-range { font-size: 2.8rem; font-weight: 800; margin: 8px 0; }
        .goal-bar { background: rgba(0,0,0,0.2); padding: 12px 18px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
        .panel { background: var(--card-bg); padding: 20px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.03); }
        .diagnosis-item { display: inline-flex; align-items: center; gap: 5px; font-size: 0.8rem; font-weight: 700; color: var(--critical); margin-right: 15px; margin-top: 8px; }
        .smart-task { background: #273549; padding: 18px; border-radius: 20px; margin-top: 12px; }
        
        /* ЭЛЕМЕНТЫ ИГРЫ */
        .word-box { background: #fff; border-radius: 28px; padding: 40px 20px; text-align: center; margin: 20px 0; min-height: 160px; display: flex; align-items: center; justify-content: center; }
        .word-text { font-size: 2.5rem; font-weight: 900; color: #1e293b; }
        .word-text span { color: var(--primary); border-bottom: 4px solid var(--primary); }
        .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        /* КНОПКИ */
        .btn-action { width: 100%; border: none; padding: 16px; border-radius: 18px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.2s; background: var(--primary); color: white; }
        .btn-choice { padding: 20px; font-size: 1.8rem; font-weight: 900; border-radius: 20px; border: none; background: #f1f5f9; color: #1e293b; cursor: pointer; }
        .btn-choice.correct { background: var(--success) !important; color: white; }
        .btn-choice.wrong { background: var(--danger) !important; color: white; }
        
        /* СТАТУСЫ */
        .status-pill { font-size: 0.65rem; padding: 4px 10px; border-radius: 8px; font-weight: 800; text-transform: uppercase; }
        .s-critical { background: var(--critical); color: #fff; }
        .s-risk { background: var(--warning); color: #000; }
        .s-unstable { background: #eab308; color: #000; }
        .s-confident { background: var(--success); color: #fff; }
        .s-perfect { background: var(--perfect); color: #fff; }
        
        .hidden { display: none !important; }
        .feedback { margin-top: 15px; padding: 15px; border-radius: 15px; background: rgba(255,255,255,0.05); text-align: center; }
    </style>
</head>
<body>

    <div id="page-dashboard" class="page active">
        <div class="predict-card">
            <span style="font-size: 0.9rem; font-weight: 600; opacity: 0.9;">Ваш прогноз сегодня</span>
            <div class="predict-range" id="score-range">-- — --</div>
            <div class="goal-bar">
                <span>Цель: <b>90+</b></span>
                <span id="goal-delta">До цели: --</span>
            </div>
        </div>

        <div class="panel" style="background: rgba(244, 63, 94, 0.05); border: 1px dashed var(--critical);">
            <div style="font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--text-muted);">Барьеры роста</div>
            <div id="diagnosis-list"></div>
        </div>

        <div class="panel">
            <h3 style="margin-bottom: 10px; font-size: 1.1rem;">План на сегодня</h3>
            <div id="smart-task-container"></div>
            <button class="btn-action" style="margin-top:15px;" onclick="showPage('game')">НАЧАТЬ ТРЕНИРОВКУ</button>
        </div>

        <div class="panel">
            <h3 style="margin-bottom: 15px; font-size: 1.1rem;">Карта зон</h3>
            <div id="topics-list"></div>
        </div>
    </div>

    <div id="page-game" class="page">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <button onclick="showPage('dashboard')" style="background:none; border:none; color:var(--text-muted); font-weight:700;">← ВЫХОД</button>
            <div id="game-stats" style="font-weight: 800;">Счёт: 0</div>
        </div>

        <div class="word-box">
            <div class="word-text" id="word-display">пр<span>_</span>вратить</div>
        </div>

        <div id="game-feedback" class="feedback hidden">
            <h4 id="fb-title" style="margin-bottom:5px;"></h4>
            <p id="fb-hint" style="font-size: 0.8rem; color: var(--text-muted);"></p>
            <button class="btn-action" style="margin-top:10px; padding:10px;" onclick="nextWord()">ДАЛЕЕ</button>
        </div>

        <div class="choices" id="choices-block">
            <button class="btn-choice" onclick="handleAnswer('е')">Е</button>
            <button class="btn-choice" onclick="handleAnswer('и')">И</button>
        </div>
    </div>

    <script>
        // --- 1. ХРАНИЛИЩЕ (STORAGE) ---
        const AppStorage = {
            save(topicId, isCorrect) {
                let history = JSON.parse(localStorage.getItem('pro_ege_data')) || [];
                history.push({ id: topicId, correct: isCorrect ? 1 : 0, t: Date.now() });
                if (history.length > 300) history.shift();
                localStorage.setItem('pro_ege_data', JSON.stringify(history));
            },
            get() { return JSON.parse(localStorage.getItem('pro_ege_data')) || []; }
        };

        // --- 2. ДАННЫЕ И ЛОГИКА (BRAIN) ---
        const dictionary = [
            { m: "беспр_кословно", a: "е", f: "беспрекословно", h: "= не переча" },
            { m: "пр_зидент", a: "е", f: "президент", h: "Словарное слово" },
            { m: "пр_вилегия", a: "и", f: "привилегия", h: "Словарное слово" },
            { m: "пр_вратный", a: "е", f: "превратный", h: "= перевёрнутый" },
            { m: "пр_оритет", a: "и", f: "приоритет", h: "Словарное слово" }
        ];

        let gameState = { score: 0, currentIdx: 0, shuffled: [] };

        const Brain = {
            getTopicStats(history, topicId) {
                const data = history.filter(h => h.id === topicId);
                if (data.length === 0) return { score: 0, stability: 0, count: 0 };
                const correct = data.filter(d => d.correct === 1).length;
                const score = Math.round((correct / data.length) * 100);
                const last10 = data.slice(-10);
                const stability = Math.round((last10.filter(d => d.correct === 1).length / last10.length) * 100);
                return { score, stability, count: data.length };
            },
            getStatus(score) {
                if (score < 35) return { label: 'Критично', class: 's-critical', color: 'var(--critical)' };
                if (score < 60) return { label: 'Риск', class: 's-risk', color: 'var(--warning)' };
                if (score < 85) return { label: 'Нестабильно', class: 's-unstable', color: '#eab308' };
                return { label: 'Уверенно', class: 's-confident', color: 'var(--success)' };
            }
        };

        // --- 3. УПРАВЛЕНИЕ СТРАНИЦАМИ (ROUTING) ---
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            if (pageId === 'dashboard') renderDashboard();
            if (pageId === 'game') initGame();
        }

        // --- 4. ЛОГИКА ДАШБОРДА ---
        function renderDashboard() {
            const history = AppStorage.get();
            const prePri = Brain.getTopicStats(history, 10);
            
            // Прогноз (упрощенная модель для примера)
            const baseScore = prePri.count > 0 ? prePri.score : 50;
            const minP = Math.max(40, baseScore - 5);
            const maxP = Math.min(100, baseScore + 12);
            
            document.getElementById('score-range').innerText = `${minP} — ${maxP}`;
            document.getElementById('goal-delta').innerText = `До цели: ${Math.max(0, 90 - maxP)} баллов`;
            
            // Список тем
            const status = Brain.getStatus(baseScore);
            document.getElementById('topics-list').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span>Задание 10: ПРЕ/ПРИ</span>
                    <span class="status-pill ${status.class}">${status.label}</span>
                </div>
                <div style="height:6px; background:rgba(255,255,255,0.05); border-radius:3px; margin:10px 0;">
                    <div style="width:${baseScore}%; height:100%; background:${status.color}; border-radius:3px;"></div>
                </div>
                <div style="font-size:0.7rem; color:var(--text-muted);">Стабильность: ${prePri.stability}% | Ответов: ${prePri.count}</div>
            `;

            // Барьеры
            document.getElementById('diagnosis-list').innerHTML = baseScore < 80 
                ? `<div class="diagnosis-item">● ПРЕ/ПРИ (${status.label})</div>`
                : `<div style="font-size:0.8rem; color:var(--success);">Критических барьеров не обнаружено</div>`;
            
            // Задача
            document.getElementById('smart-task-container').innerHTML = `
                <div class="smart-task">
                    <div style="font-size:0.6rem; color:var(--primary); font-weight:800;">РЕКОМЕНДАЦИЯ</div>
                    <div style="font-weight:700; margin:5px 0;">Закрепить тему ПРЕ/ПРИ</div>
                    <div style="font-size:0.7rem; color:var(--text-muted);">Поднимет прогноз на ~1.5 балла</div>
                </div>
            `;
        }

        // --- 5. ЛОГИКА ИГРЫ ---
        function initGame() {
            gameState.score = 0;
            gameState.currentIdx = 0;
            gameState.shuffled = [...dictionary].sort(() => Math.random() - 0.5);
            updateGameUI();
            showWord();
        }

        function showWord() {
            const word = gameState.shuffled[gameState.currentIdx];
            document.getElementById('word-display').innerHTML = word.m.replace('_', '<span>_</span>');
            document.getElementById('game-feedback').classList.add('hidden');
            document.getElementById('choices-block').classList.remove('hidden');
        }

        function handleAnswer(ans) {
            const word = gameState.shuffled[gameState.currentIdx];
            const isCorrect = ans === word.a;
            
            AppStorage.save(10, isCorrect);
            if(isCorrect) gameState.score += 10;

            document.getElementById('fb-title').innerText = isCorrect ? "ВЕРНО! ✨" : "ОШИБКА";
            document.getElementById('fb-title').style.color = isCorrect ? "var(--success)" : "var(--danger)";
            document.getElementById('fb-hint').innerText = word.f + " — " + word.h;
            
            document.getElementById('game-feedback').classList.remove('hidden');
            document.getElementById('choices-block').classList.add('hidden');
            updateGameUI();
        }

        function nextWord() {
            gameState.currentIdx++;
            if(gameState.currentIdx >= gameState.shuffled.length) {
                alert("Тренировка завершена! Счёт: " + gameState.score);
                showPage('dashboard');
            } else {
                showWord();
            }
        }

        function updateGameUI() {
            document.getElementById('game-stats').innerText = "Счёт: " + gameState.score;
        }

        // Запуск
        window.onload = () => {
            renderDashboard();
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.expand();
            }
        };
    </script>
</body>
</html>
